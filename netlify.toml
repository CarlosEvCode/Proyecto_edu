# Netlify configuration for React + Vite + Supabase

[build]
  # Comando de build
  command = "npm run build"
  
  # Directorio de salida (Vite genera los archivos aquí)
  publish = "dist"

# Configuración de SPA (Single Page Application)
# El archivo _redirects en public/ redirige todas las rutas al index.html
# Esto permite que React Router maneje todas las rutas
# NOTA: El archivo _redirects será copiado a dist/ por Vite

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permitir acceso desde cualquier origen (necesario para Supabase)
    Access-Control-Allow-Origin = "*"

# Cache para assets estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Variables de entorno (configurar en Netlify UI)
# VITE_SUPABASE_URL = https://fnoebgtfnfecpgajzjpe.supabase.co
# VITE_SUPABASE_ANON_KEY = tu_anon_key_aqui
